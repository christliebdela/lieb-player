# Lieb Player - MPV Configuration
# Disable ALL built-in UI elements

# Disable the On-Screen Controller (the interactive bar)
osc=no

# Disable all OSD text and bars
osd-level=0
osd-bar=no
osd-playing-msg=
osd-msg1=
osd-msg2=
osd-msg3=

# Disable scripts from loading (prevents OSC lua script)
load-scripts=no

# Don't show the idle screen
idle=yes

# Don't process default key bindings (we handle our own)
input-default-bindings=no

# Suppress terminal output
terminal=no

# Clear window title
title=
